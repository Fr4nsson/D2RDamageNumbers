; D2R Damage Numbers overlay config.
; Lines starting with ; are comments. Use the tray menu's Reload Config after editing.

[Overlay]
; Optional private font file next to this INI/EXE. Leave empty to use an installed Windows font.
; Example for Arial: FontFile= and FontFace=Arial
; Bundled font:
;   FontFile=diablo4.ttf and FontFace=PT Serif
;   diablo4.ttf is the free Google font PT Serif, originally named PTSerif-Regular.ttf.
FontFile=diablo4.ttf
; FontFace must match the font's internal family name, not the file name.
FontFace=PT Serif

; Base font sizes. Critical hits use CritFontSize with a small scale boost.
FontSize=38
CritFontSize=48
; Font weight is 100-1000. Common values: 400 normal, 700 bold, 900 heavy.
FontWeight=500
CritFontWeight=1000

; Text readability. Set OutlineThickness=0 and ShadowOffsetX/Y=0 to disable those effects.
OutlineThickness=1
ShadowOffsetX=0
ShadowOffsetY=0

; Max active floating numbers kept alive at once.
MaxActiveNumbers=160

; Fixed DPS meter using a configurable rolling damage window.
ShowDpsNumber=1
; 0 = left/top edge, 100 = right/bottom edge.
DpsNumberXPercent=2
DpsNumberYPercent=98
; DPS = damage in the last N seconds divided by N.
DpsRollingWindowSeconds=5

; Merge repeated small ticks on the same target into one rolling total, useful for poison.
CoalesceSmallDamage=1
CoalesceMaxDamage=999999
CoalesceWindowMs=500
CoalesceRefreshLifetime=0.52
CoalescePulseScale=1.24
CoalescePulseSeconds=0.13
; When a tick merges into an existing total, briefly show +tick flying into it.
CoalesceTickPop=1
CoalesceTickPopSeconds=0.7
CoalesceTickPopScale=0.6
CoalesceTickPopDistance=64
CoalesceTickPopMergeOffsetY=-28

; Spread separate hits on the same enemy across stable lanes instead of piling them up.
UseStackLanes=1
StackLanes=7
StackLaneWidth=40
StackVerticalStep=24
StackReuseSeconds=0.60
StackMaxYOffset=96

; Target overlay animation FPS. Match this to your game FPS if numbers look choppy.
; Higher values cost more CPU/GPU because the transparent overlay is redrawn more often.
RenderFps=120

; Lifetimes are in seconds. Prominent hits use CritLifetimeSeconds.
LifetimeSeconds=0.85
CritLifetimeSeconds=0.95
; FadeStart is a 0.0-0.95 fraction of lifetime. 0.75 means fade starts after 75%.
FadeStart=0.75

; Pop animation scale/timing. Larger overshoot makes spawn more punchy.
PopStartScale=0.01
PopOvershootScale=1.75
PopInSeconds=0.08
PopSettleSeconds=0.12

; Motion tuning. FloatSpeed is upward pixels/sec; HorizontalDrift adds side drift after spawn.
FloatSpeed=45
HorizontalDrift=0
; Vertical spawn offset in overlay pixels. Negative starts numbers higher.
SpawnYOffset=0
; FollowResponse controls how quickly damage numbers catch up to a moving target/camera.
; Higher follows tighter; lower hides more jitter from coarse game position updates.
FollowResponse=72
; Large projection changes are speed-limited after spawn so bad reads cannot yank numbers across the screen.
FollowSnapDistance=180
FollowMaxSpeed=2400

[Test]
; Synthetic test events only. This does not read game memory.
Enabled=0
NormalHotkey=F8
CritHotkey=F9
BurstHotkey=F11
; Burst spawns mixed normal/critical events near the target.
BurstCount=8
BurstRadius=32

[Log]
; Controls whether this app writes diagnostic and hit-recorder entries to D2RDamageNumbers.log.
; Tray menu -> Write Log toggles this and saves it.
Enabled=0

[Memory]
; Real damage currently reads monster HP drops only.
; Real critical/deadly-strike coloring will stay disabled until a real per-hit crit flag is found.
; PollSeconds controls how often memory is sampled. Lower values catch shorter-lived hit data but cost more CPU.
PollSeconds=0.02
; TrackAllMonsters=1 removes the hover requirement by watching HP drops for all readable monster units.
; Set to 0 to use the old hovered-monster-only tracker.
TrackAllMonsters=1
; UseWorldPositions reads each unit's path/world coordinates and projects damage numbers near the damaged unit.
; While hovering a monster, the overlay auto-calibrates the projection against your cursor.
UseWorldPositions=1
; FollowDamageTargets keeps active damage numbers attached to the target as the camera/player moves.
FollowDamageTargets=1
; Screen-anchor learning looks for an actual screen coordinate inside the hovered monster structures.
; If it finds a stable candidate, damage numbers use that before falling back to world projection.
UseScreenAnchorCandidates=0
; Experimental memory-field coordinate learner. Leave this off for stable path-coordinate tracking.
UseWorldCoordCandidates=0
ScreenAnchorMinSamples=16
ScreenAnchorMinDistinctUnits=2
ScreenAnchorMaxCursorDistance=320
ScreenAnchorMaxAverageError=110
ScreenAnchorMinMovementSpan=80
; LearnWorldProjection collects hover samples and fits the screen projection for your camera/resolution.
; Hover monsters in a few different screen positions until debug says "World pos: on follow learned".
LearnWorldProjection=1
WorldProjectionMinSamples=8
WorldCoordMinDistinctUnits=2
WorldCoordMaxRmsError=90
WorldCoordMinMovementSpan=120
; F6 writes these after you hover a monster and put the cursor exactly where the lock should sit.
WorldCoordScreenOffsetX=0
WorldCoordScreenOffsetY=0
; Projection tuning for D2-style isometric world coords. Defaults are the current best-known values.
; These are only the fallback before enough learned samples exist.
WorldAnchorX=0.50
WorldAnchorY=0.52
WorldTileWidth=16
WorldTileHeight=8
; Press this while hovering an enemy to log candidate screen/world position fields for enemy-follow research.
PositionProbeHotkey=F6
; HitRecorder keeps a short rolling memory timeline around real hits for crit research.
HitRecorder=0
; Press this after a hit you believe was a crit to write a marker block around the latest hit.
MarkerHotkey=F7

[Debug]
; Shows small overlay status text. Can also be toggled from tray.
ShowStatus=0
; Shows lightweight hover markers while hovering a monster.
; Press PositionCandidateHotkey to compare cursor vs the locked target position.
ShowPositionCandidates=0
PositionCandidateHotkey=F5

[Colors]
; Damage categories.
Normal=#EBEBE1
Critical=#FFD646

; Colors accept #RRGGBB or R,G,B.
Outline=#2A1C08
Shadow=#281C06
